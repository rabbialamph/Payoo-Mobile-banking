<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind css -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <title>Payoo | Login</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/logo.png">
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">

    <div class="hero pt-30">
        <img src="assets/Logo-full.png" alt="">
    </div>
 
  <div class="hero mt-8">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">
        
        <fieldset class="fieldset">
          <label class="label text-[14px] font-semibold text-black">Mobile Number</label>

          <input id="input-number" type="text" class="input mb-4 rounded-full" maxlength="11" placeholder="Enter your number" />

          <label class="label text-[14px] font-semibold text-black">4 Digit Pin</label>

          <input id="input-pin" type="password" inputmode="numeric" class="input rounded-full" maxlength="4" placeholder="Enter your 4 digit pin" />

          <button id="login-btn" class="btn btn-primary rounded-full mt-4">Login</button>
        </fieldset>
      </div>
    </div>
  </div>
  <script src="login.js"></script> 
</body>
</html>
